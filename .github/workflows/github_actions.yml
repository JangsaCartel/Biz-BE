# GitHub Actions 이름 설정
name: CI/CD using github actions & docker

# 워크플로우 실행 조건 설정
on:
  push:
    branches: ['main'] # main 브랜치에 push될 때 실행
  pull_request:
    branches: ['main'] # main 브랜치로 pull request가 생성될 때 실행

# 실행될 작업(Job) 정의
jobs:
  build:
    # 작업이 실행될 환경 설정 (Ubuntu 최신 버전)
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      # 리포지토리의 코드를 워크플로우 환경으로 가져옴
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle 캐싱 설정
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. application.properties 파일 생성
      # GitHub Secrets에 저장된 값을 사용하여 application.properties 파일을 생성.
      - name: Create application.properties
        run: echo "${{ secrets.APPLICATION_PROPERTIES }}" > src/main/resources/application.properties
        shell: bash

      # 5. gradlew 실행 권한 부여
      # gradlew 스크립트를 실행할 수 있도록 권한을 설정
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. Gradle로 빌드
      # gradlew를 사용하여 프로젝트를 빌드하고 테스트를 실행
      - name: Build with Gradle
        run: ./gradlew build

      #Docker 관련 코드는 추후 작성 예정
